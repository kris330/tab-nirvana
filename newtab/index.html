<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <!-- Reuse the modal overlay styles from the content script -->
  <link rel="stylesheet" href="../content_scripts/floating-btn.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #141929;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    #clock {
      font-size: 88px;
      font-weight: 200;
      letter-spacing: -3px;
      color: #f1f5f9;
      line-height: 1;
    }

    #date {
      font-size: 16px;
      font-weight: 400;
      color: #4b5563;
      letter-spacing: 0.3px;
    }

    #open-btn {
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 11px 22px;
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 24px;
      color: #a5b4fc;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.12s;
    }

    #open-btn:hover {
      background: rgba(99, 102, 241, 0.28);
      border-color: rgba(99, 102, 241, 0.55);
      color: #c7d2fe;
      transform: translateY(-1px);
    }

    #open-btn:active { transform: scale(0.96); }

    #hint {
      margin-top: 10px;
      font-size: 11px;
      color: #374151;
      letter-spacing: 0.4px;
    }

    kbd {
      display: inline-flex;
      align-items: center;
      background: #1e2636;
      border: 1px solid #374151;
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: inherit;
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div id="clock"></div>
  <div id="date"></div>

  <button id="open-btn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.2"
         stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2.5"/>
      <path d="M8 21h8"/><path d="M12 17v4"/>
    </svg>
    Open TabNirvana
  </button>

  <div id="hint">or press <kbd>Alt</kbd>+<kbd>V</kbd></div>

  <script src="newtab.js"></script>
</body>
</html>
